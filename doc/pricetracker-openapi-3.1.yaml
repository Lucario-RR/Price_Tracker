openapi: 3.1.0
jsonSchemaDialect: https://json-schema.org/draft/2020-12/schema
info:
  title: PriceTracker API
  version: 1.1.0-draft
  summary: REST API for public price discovery, contributed price submissions, multi-attachment purchase evidence, reusable identity/security, and moderation.
  description: 'Greenfield OpenAPI 3.1 contract for the PriceTracker system.


    This revision extends the original draft with reusable identity and file-management capabilities:

    - multiple email addresses and phone numbers per user

    - password change/reset with server-side history enforcement

    - passkey (WebAuthn) registration and authentication

    - TOTP-based MFA and recovery codes

    - multi-file purchase attachments instead of a single receipt field

    - privacy/legal consent records and cookie preference APIs

    - shop-scoped product codes instead of assuming one global barcode namespace


    Sensitive artifacts such as raw receipt files, internal source attribution, moderation notes,

    password hashes, salts, and recovery codes at rest are intentionally excluded from public DTOs.


    Rust-friendly notes:

    - IDs use `format: uuid` to map cleanly to `uuid::Uuid`.

    - Monetary values use decimal strings to map cleanly to `rust_decimal::Decimal`.

    - Timestamps use `format: date-time` for `chrono::DateTime<Utc>`.

    - JSON field names are camelCase to align with `#[serde(rename_all = "camelCase")]`.

    - WebAuthn request/response blobs are modeled as JSON objects to integrate with `webauthn-rs`.

    '
x-rust-backend:
  recommendedFrameworks:
  - axum
  - actix-web
  recommendedCrates:
  - serde
  - utoipa
  - validator
  - uuid
  - chrono
  - rust_decimal
  - sqlx
  - tracing
  - argon2
  - webauthn-rs
  - totp-rs
  - tower-cookies
  - tower-sessions
  notes:
  - Hash passwords with Argon2id using a unique random salt per credential version and store password history separately so reuse can be rejected at the API boundary.
  - Prefer WebAuthn via `webauthn-rs` for passkeys and keep browser-facing ceremony payloads as dedicated DTOs rather than leaking persistence models.
  - Use `rust_decimal::Decimal` for prices, discounts, and unit prices.
  - Generate or validate the contract with `utoipa` and keep examples in sync with DTO tests.
  - Keep request DTOs and public response DTOs separate from internal persistence models.
  - Model session cookies with `HttpOnly`, `Secure`, `SameSite=Lax` or stricter, and pair cookie-based refresh with CSRF protection.
servers:
- url: https://api.example.com/api/v1
  description: Production
- url: http://localhost:3000/api/v1
  description: Local development
tags:
- name: Auth
- name: Users
- name: Catalog
- name: Shops
- name: Prices
- name: Purchases
- name: Files
- name: Comparisons
- name: Watchlists
- name: Alerts
- name: AdminModeration
- name: Privacy
- name: IdentitySecurity
paths:
  /auth/register:
    post:
      tags:
      - Auth
      operationId: register
      summary: Register a new user account and capture required legal consents
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            examples:
              default:
                value:
                  email: alex@example.com
                  password: StrongPassword!234
                  displayName: Alex
                  primaryPhone: '+447700900123'
                  acceptedLegalDocuments:
                  - documentKey: terms_of_service
                    version: '2026-04-01'
                  - documentKey: privacy_policy
                    version: '2026-04-01'
      responses:
        '201':
          description: Account created and session issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSessionEnvelope'
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          $ref: '#/components/responses/Conflict'
  /auth/login:
    post:
      tags:
      - Auth
      operationId: login
      summary: Authenticate with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              default:
                value:
                  email: alex@example.com
                  password: StrongPassword!234
      responses:
        '200':
          description: Access token returned and refresh cookie set by the server
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSessionEnvelope'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '202':
          description: Second factor required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MfaChallengeEnvelope'
      description: If MFA is enabled, the server returns a challenge instead of a session.
  /auth/refresh:
    post:
      tags:
      - Auth
      operationId: refreshSession
      summary: Refresh an access token using the refresh cookie
      security:
      - refreshTokenCookie: []
        csrfHeader: []
      responses:
        '200':
          description: Access token refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSessionEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /auth/logout:
    post:
      tags:
      - Auth
      operationId: logout
      summary: Invalidate the current session
      security:
      - bearerAuth: []
      - refreshTokenCookie: []
        csrfHeader: []
      responses:
        '204':
          description: Session invalidated
  /me:
    get:
      tags:
      - Users
      operationId: getMe
      summary: Get the current authenticated user profile including primary contacts and security summary
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Current profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
    patch:
      tags:
      - Users
      operationId: updateMe
      summary: Update the current authenticated user profile (display preferences only; use dedicated contact and security endpoints for emails, phones, passkeys, and MFA)
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfileUpdateRequest'
            examples:
              default:
                value:
                  displayName: Alex Pricewatch
                  defaultCurrency: GBP
      responses:
        '200':
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileEnvelope'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '412':
          $ref: '#/components/responses/PreconditionFailed'
  /categories:
    get:
      tags:
      - Catalog
      operationId: listCategories
      summary: List categories
      responses:
        '200':
          description: Category list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryListEnvelope'
  /brands:
    get:
      tags:
      - Catalog
      operationId: listBrands
      summary: List brands
      parameters:
      - $ref: '#/components/parameters/SearchQuery'
      responses:
        '200':
          description: Brand list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BrandListEnvelope'
  /units:
    get:
      tags:
      - Catalog
      operationId: listUnits
      summary: List supported units
      responses:
        '200':
          description: Unit list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnitListEnvelope'
  /discount-types:
    get:
      tags:
      - Catalog
      operationId: listDiscountTypes
      summary: List supported discount types
      responses:
        '200':
          description: Discount type list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiscountTypeListEnvelope'
  /items:
    get:
      tags:
      - Catalog
      operationId: listItems
      summary: Search or browse items
      parameters:
      - $ref: '#/components/parameters/SearchQuery'
      - $ref: '#/components/parameters/CategoryIdQuery'
      - $ref: '#/components/parameters/BrandIdQuery'
      - $ref: '#/components/parameters/Cursor'
      - $ref: '#/components/parameters/Limit'
      - name: sort
        in: query
        schema:
          type: string
          enum:
          - name
          - relevance
          - latestPrice
        example: relevance
      responses:
        '200':
          description: Item summaries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemListEnvelope'
        '400':
          $ref: '#/components/responses/ValidationError'
  /items/{itemId}:
    get:
      tags:
      - Catalog
      operationId: getItem
      summary: Get an item by ID
      parameters:
      - $ref: '#/components/parameters/ItemIdPath'
      responses:
        '200':
          description: Item detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemEnvelope'
        '404':
          $ref: '#/components/responses/NotFound'
  /items/{itemId}/variants:
    get:
      tags:
      - Catalog
      operationId: listItemVariants
      summary: List variants for an item
      parameters:
      - $ref: '#/components/parameters/ItemIdPath'
      responses:
        '200':
          description: Variant list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemVariantListEnvelope'
        '404':
          $ref: '#/components/responses/NotFound'
  /item-variants/{variantId}:
    get:
      tags:
      - Catalog
      operationId: getItemVariant
      summary: Get one item variant
      parameters:
      - $ref: '#/components/parameters/VariantIdPath'
      responses:
        '200':
          description: Variant detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemVariantEnvelope'
        '404':
          $ref: '#/components/responses/NotFound'
  /item-variants/{variantId}/prices:
    get:
      tags:
      - Prices
      operationId: listVariantPrices
      summary: List latest public prices for a variant
      parameters:
      - $ref: '#/components/parameters/VariantIdPath'
      - $ref: '#/components/parameters/ShopIdQuery'
      - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Public price list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicPriceListEnvelope'
        '404':
          $ref: '#/components/responses/NotFound'
  /item-variants/{variantId}/price-history:
    get:
      tags:
      - Prices
      operationId: getVariantPriceHistory
      summary: Get price history for a variant
      parameters:
      - $ref: '#/components/parameters/VariantIdPath'
      - $ref: '#/components/parameters/ShopIdQuery'
      - name: range
        in: query
        required: false
        schema:
          type: string
          enum:
          - 7d
          - 30d
          - 90d
          - 180d
          - 365d
        example: 90d
      responses:
        '200':
          description: Price history series
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PriceHistoryEnvelope'
        '404':
          $ref: '#/components/responses/NotFound'
  /compare:
    get:
      tags:
      - Comparisons
      operationId: compareVariants
      summary: Compare selected variants by latest known offers
      parameters:
      - name: variantIds
        in: query
        required: true
        style: form
        explode: false
        schema:
          type: array
          minItems: 1
          items:
            type: string
            format: uuid
        example:
        - 22222222-2222-4222-8222-222222222222
        - a2222222-2222-4222-8222-222222222222
      responses:
        '200':
          description: Comparison result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComparisonEnvelope'
        '400':
          $ref: '#/components/responses/ValidationError'
  /comparisons:
    post:
      tags:
      - Comparisons
      operationId: createComparison
      summary: Compare selected variants using a request body
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ComparisonRequest'
            examples:
              default:
                value:
                  variantIds:
                  - 22222222-2222-4222-8222-222222222222
                  - a2222222-2222-4222-8222-222222222222
      responses:
        '200':
          description: Comparison result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComparisonEnvelope'
        '400':
          $ref: '#/components/responses/ValidationError'
  /shops:
    get:
      tags:
      - Shops
      operationId: listShops
      summary: Search or browse shops
      parameters:
      - $ref: '#/components/parameters/SearchQuery'
      - $ref: '#/components/parameters/Cursor'
      - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Shop list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShopListEnvelope'
  /shops/{shopId}:
    get:
      tags:
      - Shops
      operationId: getShop
      summary: Get one shop
      parameters:
      - $ref: '#/components/parameters/ShopIdPath'
      responses:
        '200':
          description: Shop detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShopEnvelope'
        '404':
          $ref: '#/components/responses/NotFound'
  /files/uploads:
    post:
      tags:
      - Files
      operationId: createFileUploadIntent
      summary: Create a signed upload intent for a private file
      description: Authenticated users upload private files such as purchase receipts or supporting images through signed object-store URLs. Files stay private until explicitly linked to a caller-owned resource and never become public by default.
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FileUploadIntentRequest'
            examples:
              default:
                value:
                  filename: receipt-page-1.jpg
                  contentType: image/jpeg
                  size: 231231
                  purpose: purchase_receipt
      responses:
        '201':
          description: Upload intent created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileUploadIntentEnvelope'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
  /files/uploads/{fileId}/complete:
    post:
      tags:
      - Files
      operationId: completeFileUpload
      summary: Finalize a signed upload after the client uploads the object
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/FileIdPath'
      responses:
        '200':
          description: File metadata after upload completion
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileRecordEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /me/files/{fileId}:
    get:
      tags:
      - Files
      operationId: getOwnFile
      summary: Get file metadata for one of the caller's files
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/FileIdPath'
      responses:
        '200':
          description: File metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileRecordEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /me/files/{fileId}/download:
    get:
      tags:
      - Files
      operationId: getOwnFileDownload
      summary: Get a short-lived signed download URL for one of the caller's files
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/FileIdPath'
      responses:
        '200':
          description: Signed download URL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileDownloadEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /purchases:
    post:
      tags:
      - Purchases
      operationId: createPurchase
      summary: Create a purchase record owned by the current user with zero or more private attachments
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PurchaseCreateRequest'
            examples:
              default:
                value:
                  shopId: 33333333-3333-4333-8333-333333333333
                  purchaseTime: '2026-04-02T16:55:00Z'
                  attachmentFileIds:
                  - 66666666-6666-4666-8666-666666666666
                  - 77777777-7777-4777-8777-777777777777
                  notes: Two receipt photos for one shopping trip.
      responses:
        '201':
          description: Purchase created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PurchaseEnvelope'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
  /me/purchases:
    get:
      tags:
      - Purchases
      operationId: listOwnPurchases
      summary: List the caller's purchases
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/Cursor'
      - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Purchase list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PurchaseListEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /me/purchases/{purchaseId}:
    get:
      tags:
      - Purchases
      operationId: getOwnPurchase
      summary: Get one purchase owned by the caller
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/PurchaseIdPath'
      responses:
        '200':
          description: Purchase detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PurchaseEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags:
      - Purchases
      operationId: updateOwnPurchase
      summary: Update one purchase owned by the caller
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/PurchaseIdPath'
      - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PurchaseUpdateRequest'
            examples:
              default:
                value:
                  purchaseTime: '2026-04-02T17:05:00Z'
                  attachmentFileIds:
                  - 66666666-6666-4666-8666-666666666666
      responses:
        '200':
          description: Updated purchase
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PurchaseEnvelope'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '412':
          $ref: '#/components/responses/PreconditionFailed'
    delete:
      tags:
      - Purchases
      operationId: deleteOwnPurchase
      summary: Soft delete one purchase owned by the caller
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/PurchaseIdPath'
      responses:
        '204':
          description: Purchase deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /prices:
    post:
      tags:
      - Prices
      operationId: createPriceSubmission
      summary: Submit a price record owned by the current user
      description: 'The server derives submission ownership and internal source attribution from the authenticated session.

        Client applications must not send internal source identifiers.

        '
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PriceCreateRequest'
            examples:
              default:
                value:
                  itemVariantId: 22222222-2222-4222-8222-222222222222
                  purchaseId: 44444444-4444-4444-8444-444444444444
                  originalAmount: '1.99'
                  originalCurrency: GBP
                  discountAmount: '0.30'
                  discountCurrency: GBP
                  discountTypeId: d1111111-1111-4111-8111-111111111111
                  recordedAt: '2026-04-02T16:55:00Z'
                  notes: yellow sticker
      responses:
        '201':
          description: Price submission created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PriceSubmissionEnvelope'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/RateLimited'
  /me/prices:
    get:
      tags:
      - Prices
      operationId: listOwnPriceSubmissions
      summary: List the caller's price submissions
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/Cursor'
      - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Price submission list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PriceSubmissionListEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /me/prices/{priceId}:
    get:
      tags:
      - Prices
      operationId: getOwnPriceSubmission
      summary: Get one price submission owned by the caller
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/PriceIdPath'
      responses:
        '200':
          description: Price submission detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PriceSubmissionEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags:
      - Prices
      operationId: updateOwnPriceSubmission
      summary: Update one price submission owned by the caller
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/PriceIdPath'
      - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PriceUpdateRequest'
            examples:
              default:
                value:
                  notes: yellow sticker - markdown corrected
      responses:
        '200':
          description: Updated price submission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PriceSubmissionEnvelope'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '412':
          $ref: '#/components/responses/PreconditionFailed'
    delete:
      tags:
      - Prices
      operationId: deleteOwnPriceSubmission
      summary: Soft delete one price submission owned by the caller
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/PriceIdPath'
      responses:
        '204':
          description: Price submission deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /me/watchlist:
    get:
      tags:
      - Watchlists
      operationId: listWatchlist
      summary: List the caller's watchlist entries
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Watchlist entries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WatchlistEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /me/watchlist/items:
    post:
      tags:
      - Watchlists
      operationId: createWatchlistItem
      summary: Add an item variant to the caller's watchlist
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WatchlistCreateRequest'
            examples:
              default:
                value:
                  itemVariantId: 22222222-2222-4222-8222-222222222222
      responses:
        '201':
          description: Watchlist entry created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WatchlistEntryEnvelope'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
  /me/watchlist/items/{watchId}:
    delete:
