  responses:
    ValidationError:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          examples:
            default:
              value:
                error:
                  code: VALIDATION_ERROR
                  message: Submitted price is outside allowed bounds.
                  details:
                    field: originalAmount
                  requestId: req_01HZZZZZZZZZZ
    Unauthorized:
      description: Authentication is required or invalid
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          examples:
            default:
              value:
                error:
                  code: UNAUTHORIZED
                  message: Authentication is required.
                  requestId: req_01HZZZZZZZZZZ
    Forbidden:
      description: The caller lacks permission for this action
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          examples:
            default:
              value:
                error:
                  code: FORBIDDEN
                  message: You do not have permission to perform this action.
                  requestId: req_01HZZZZZZZZZZ
    NotFound:
      description: The requested resource does not exist
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          examples:
            default:
              value:
                error:
                  code: NOT_FOUND
                  message: Resource not found.
                  requestId: req_01HZZZZZZZZZZ
    Conflict:
      description: The request conflicts with existing state
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          examples:
            default:
              value:
                error:
                  code: CONFLICT
                  message: A similar submission already exists.
                  requestId: req_01HZZZZZZZZZZ
    RateLimited:
      description: Too many requests
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          examples:
            default:
              value:
                error:
                  code: RATE_LIMITED
                  message: Too many requests. Try again later.
                  requestId: req_01HZZZZZZZZZZ
    PreconditionFailed:
      description: The resource changed and the precondition no longer matches
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          examples:
            default:
              value:
                error:
                  code: PRECONDITION_FAILED
                  message: The resource has been modified. Refresh and retry.
                  requestId: req_01HZZZZZZZZZZ
  schemas:
    Identifier:
      type: string
      format: uuid
      example: 11111111-1111-4111-8111-111111111111
    CurrencyCode:
      type: string
      pattern: ^[A-Z]{3}$
      example: GBP
    DecimalString:
      type: string
      pattern: ^-?\d+(\.\d{1,4})?$
      example: '1.99'
    ResponseMeta:
      type: object
      additionalProperties: false
      required:
      - requestId
      properties:
        requestId:
          type: string
          example: req_01HZZZZZZZZZZ
        nextCursor:
          type:
          - string
          - 'null'
          example: cur_eyJvZmZzZXQiOjIwfQ
    ErrorObject:
      type: object
      additionalProperties: false
      required:
      - code
      - message
      - requestId
      properties:
        code:
          type: string
          example: VALIDATION_ERROR
        message:
          type: string
          example: Submitted price is outside allowed bounds.
        details:
          type:
          - object
          - 'null'
          additionalProperties: true
        requestId:
          type: string
          example: req_01HZZZZZZZZZZ
    ErrorEnvelope:
      type: object
      additionalProperties: false
      required:
      - error
      properties:
        error:
          $ref: '#/components/schemas/ErrorObject'
    RegisterRequest:
      type: object
      additionalProperties: false
      required:
      - email
      - password
      - displayName
      - acceptedLegalDocuments
      properties:
        email:
          type: string
          format: email
          example: alex@example.com
        password:
          type: string
          minLength: 12
          maxLength: 128
          example: StrongPassword!234
        displayName:
          type: string
          minLength: 2
          maxLength: 80
          example: Alex
        primaryPhone:
          type:
          - string
          - 'null'
          pattern: ^\+[1-9]\d{6,14}$
          example: '+447700900123'
        acceptedLegalDocuments:
          type: array
          minItems: 2
          items:
            $ref: '#/components/schemas/LegalDocumentAcceptance'
          example:
          - documentKey: terms_of_service
            version: '2026-04-01'
          - documentKey: privacy_policy
            version: '2026-04-01'
    LoginRequest:
      type: object
      additionalProperties: false
      required:
      - email
      - password
      properties:
        email:
          type: string
          format: email
          example: alex@example.com
        password:
          type: string
          minLength: 1
          maxLength: 128
          example: StrongPassword!234
        rememberMe:
          type: boolean
          default: false
          example: false
    AuthSession:
      type: object
      additionalProperties: false
      required:
      - accessToken
      - tokenType
      - expiresInSeconds
      - user
      properties:
        accessToken:
          type: string
          example: eyJhbGciOi...
        tokenType:
          type: string
          enum:
          - Bearer
          example: Bearer
        expiresInSeconds:
          type: integer
          minimum: 1
          example: 900
        user:
          $ref: '#/components/schemas/UserProfile'
    AuthSessionEnvelope:
      type: object
      additionalProperties: false
      required:
      - data
      - meta
      properties:
        data:
          $ref: '#/components/schemas/AuthSession'
        meta:
          $ref: '#/components/schemas/ResponseMeta'
    UserProfile:
      type: object
      additionalProperties: false
      required:
      - id
      - primaryEmail
      - displayName
      - roles
      - scopes
      - defaultCurrency
      - createdAt
      - security
      properties:
        id:
          $ref: '#/components/schemas/Identifier'
        primaryEmail:
